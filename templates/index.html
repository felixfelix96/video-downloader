<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>視頻下載器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 25px;
            position: relative;
        }
        
        header h1 {
            font-size: 1.8em;
            margin-bottom: 5px;
        }
        
        header p {
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        .logout-btn {
            position: absolute;
            right: 0;
            top: 0;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .input-section {
            margin-bottom: 20px;
        }
        
        .url-input {
            width: 100%;
            padding: 15px;
            font-size: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
            margin-bottom: 12px;
            transition: border-color 0.3s;
        }
        
        .url-input:focus {
            border-color: #667eea;
        }
        
        .submit-btn {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
        }
        
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        /* 等待狀態 */
        .waiting-section {
            display: none;
            text-align: center;
            padding: 30px 20px;
        }
        
        .waiting-section.active {
            display: block;
        }
        
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .waiting-text {
            font-size: 18px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .estimated-time {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 15px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            transition: width 0.3s;
            width: 0%;
        }
        
        .progress-text {
            font-size: 13px;
            color: #666;
            margin-top: 8px;
        }
        
        /* 完成狀態 */
        .completed-section {
            display: none;
            text-align: center;
            padding: 30px 20px;
        }
        
        .completed-section.active {
            display: block;
        }
        
        .success-icon {
            width: 70px;
            height: 70px;
            background: #4CAF50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 35px;
        }
        
        .video-title {
            font-size: 16px;
            color: #333;
            margin-bottom: 10px;
            word-break: break-all;
        }
        
        .video-info {
            font-size: 13px;
            color: #666;
            margin-bottom: 20px;
        }
        
        .download-btn {
            display: inline-block;
            padding: 16px 40px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background: #4CAF50;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.4);
        }
        
        .reset-btn {
            display: block;
            margin-top: 15px;
            padding: 12px 30px;
            font-size: 14px;
            color: #666;
            background: #f0f0f0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-left: auto;
            margin-right: auto;
        }
        
        /* 錯誤狀態 */
        .error-section {
            display: none;
            text-align: center;
            padding: 30px 20px;
        }
        
        .error-section.active {
            display: block;
        }
        
        .error-icon {
            width: 70px;
            height: 70px;
            background: #f44336;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 35px;
        }
        
        .error-text {
            color: #f44336;
            margin-bottom: 20px;
        }
        
        /* 提示信息 */
        .tips {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
            color: #1565c0;
        }
        
        .supported-sites {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }
        
        .supported-sites h3 {
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
        }
        
        .site-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .site-tag {
            background: #f0f0f0;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            color: #666;
        }
        
        @media (max-width: 480px) {
            .card {
                padding: 20px 15px;
            }
            
            header h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 視頻下載器</h1>
            <p>輸入網址，等待片刻即可下載</p>
            <button class="logout-btn" onclick="logout()">退出</button>
        </header>
        
        <!-- 輸入區域 -->
        <div class="card input-section" id="inputSection">
            <div class="tips">
                💡 粘貼視頻網址後點擊提交，等待 2-5 分鐘即可下載
            </div>
            
            <input type="text" class="url-input" id="urlInput" 
                   placeholder="請粘貼視頻網址，例如：https://www.bilibili.com/video/BVxxxxx/">
            
            <button class="submit-btn" id="submitBtn" onclick="submitUrl()">
                開始提取視頻
            </button>
            
            <div class="supported-sites">
                <h3>支持的網站</h3>
                <div class="site-tags">
                    <span class="site-tag" style="background:#00a1d6;color:white">Bilibili</span>
                    <span class="site-tag" style="background:#000;color:white">抖音</span>
                    <span class="site-tag" style="background:#ff5000;color:white">快手</span>
                    <span class="site-tag">西瓜視頻</span>
                    <span class="site-tag">頭條</span>
                    <span class="site-tag">微博</span>
                    <span class="site-tag">YouTube</span>
                    <span class="site-tag">...等1000+網站</span>
                </div>
                <p style="font-size:11px;color:#999;margin-top:10px">⚠️ 注意：由於服務器限制，僅支持下載 50MB 以內的視頻</p>
            </div>
        </div>
        
        <!-- 等待區域 -->
        <div class="card waiting-section" id="waitingSection">
            <div class="spinner"></div>
            <div class="waiting-text">正在提取視頻...</div>
            <div class="estimated-time">預計等待時間：<span id="estimatedTime">2-5分鐘</span></div>
            
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">準備中...</div>
        </div>
        
        <!-- 完成區域 -->
        <div class="card completed-section" id="completedSection">
            <div class="success-icon">✓</div>
            <div class="video-title" id="videoTitle">視頻標題</div>
            <div class="video-info" id="videoInfo">準備就緒，點擊下方按鈕下載</div>
            
            <a href="#" class="download-btn" id="downloadBtn" onclick="downloadVideo()">
                ⬇️ 下載視頻
            </a>
            
            <button class="reset-btn" onclick="resetForm()">
                下載其他視頻
            </button>
        </div>
        
        <!-- 錯誤區域 -->
        <div class="card error-section" id="errorSection">
            <div class="error-icon">✕</div>
            <div class="waiting-text">提取失敗</div>
            <div class="error-text" id="errorText">未知錯誤</div>
            <button class="reset-btn" onclick="resetForm()">
                重新嘗試
            </button>
        </div>
    </div>

    <script>
        let currentTaskId = null;
        let checkInterval = null;
        
        // 提交URL
        async function submitUrl() {
            const url = document.getElementById('urlInput').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            
            if (!url) {
                alert('請輸入視頻網址');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = '提交中...';
            
            try {
                const response = await fetch('/api/extract', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    currentTaskId = data.task_id;
                    showWaiting(data.estimated_time);
                    startCheckingStatus();
                } else {
                    alert(data.error || '提交失敗');
                    submitBtn.disabled = false;
                    submitBtn.textContent = '開始提取視頻';
                }
            } catch (error) {
                alert('網絡錯誤，請重試');
                submitBtn.disabled = false;
                submitBtn.textContent = '開始提取視頻';
            }
        }
        
        // 顯示等待界面
        function showWaiting(estimatedTime) {
            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('waitingSection').classList.add('active');
            document.getElementById('estimatedTime').textContent = estimatedTime;
        }
        
        // 開始檢查狀態
        function startCheckingStatus() {
            checkInterval = setInterval(async () => {
                try {
                    const response = await fetch(`/api/status/${currentTaskId}`);
                    const data = await response.json();
                    
                    if (data.success) {
                        const task = data.task;
                        
                        // 更新進度
                        if (task.progress > 0) {
                            document.getElementById('progressFill').style.width = task.progress + '%';
                            document.getElementById('progressText').textContent = 
                                `下載進度: ${task.progress}%`;
                        }
                        
                        // 檢查狀態
                        if (task.status === 'completed') {
                            clearInterval(checkInterval);
                            showCompleted(task);
                        } else if (task.status === 'failed') {
                            clearInterval(checkInterval);
                            showError(task.error);
                        }
                    }
                } catch (error) {
                    console.error('檢查狀態失敗:', error);
                }
            }, 2000); // 每2秒檢查一次
        }
        
        // 顯示完成界面
        function showCompleted(task) {
            document.getElementById('waitingSection').classList.remove('active');
            document.getElementById('completedSection').classList.add('active');
            document.getElementById('videoTitle').textContent = task.title || '視頻文件';
            document.getElementById('downloadBtn').href = `/api/download/${currentTaskId}`;
        }
        
        // 顯示錯誤界面
        function showError(error) {
            document.getElementById('waitingSection').classList.remove('active');
            document.getElementById('errorSection').classList.add('active');
            document.getElementById('errorText').textContent = error || '提取失敗，請重試';
        }
        
        // 下載視頻
        function downloadVideo() {
            // 下載會在新窗口打開
            setTimeout(() => {
                if (confirm('下載已開始！是否繼續下載其他視頻？')) {
                    resetForm();
                }
            }, 1000);
        }
        
        // 重置表單
        function resetForm() {
            currentTaskId = null;
            if (checkInterval) {
                clearInterval(checkInterval);
            }
            
            document.getElementById('urlInput').value = '';
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('submitBtn').textContent = '開始提取視頻';
            
            document.getElementById('inputSection').style.display = 'block';
            document.getElementById('waitingSection').classList.remove('active');
            document.getElementById('completedSection').classList.remove('active');
            document.getElementById('errorSection').classList.remove('active');
            
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressText').textContent = '準備中...';
        }
        
        // 退出登錄
        async function logout() {
            try {
                await fetch('/logout', { method: 'POST' });
                window.location.href = '/';
            } catch (error) {
                console.error('退出失敗:', error);
            }
        }
        
        // 回車鍵提交
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                submitUrl();
            }
        });
    </script>
</body>
</html>
